#cloud-config
# Cloud-init for Nautiloop k3s server
# Prepares the server for k3s installation via remote-exec provisioner

package_update: true
package_upgrade: true

packages:
  - curl
  - jq
  - unzip
  - open-iscsi
  - nfs-common

# Create directories for persistence
runcmd:
  - mkdir -p /data/backups
  - chmod 700 /data/backups
  - mkdir -p /data/nautiloop-postgres
  - chmod 755 /data/nautiloop-postgres

# Disable swap (required for k3s)
swap:
  filename: /dev/null
  size: 0

# Set up log rotation for container logs
write_files:
  - path: /etc/logrotate.d/containers
    content: |
      /var/log/containers/*.log {
        daily
        rotate 5
        maxsize 50M
        compress
        missingok
        notifempty
        copytruncate
      }
