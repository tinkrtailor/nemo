#cloud-config
# Cloud-init for Nemo k3s server
# Prepares the server for k3s installation via remote-exec provisioner

package_update: true
package_upgrade: true

packages:
  - curl
  - jq
  - unzip
  - open-iscsi
  - nfs-common

# Create directories for persistence
runcmd:
  - mkdir -p /data/backups
  - chmod 755 /data/backups
  # Wait for Hetzner Volume to be attached and mount it.
  # Only format if the volume has no filesystem (blkid returns non-zero).
  # Never blindly mkfs — a transient mount error must NOT destroy data.
  # Use stable /dev/disk/by-id/ symlink in fstab — NOT the volatile /dev/sdX
  # that readlink resolves to. Device letters can change across reboots.
  - DISK_STABLE="/dev/disk/by-id/scsi-0HC_Volume_$(echo "${volume_name}" | tr ' ' '_')"
  - until [ -L "$DISK_STABLE" ]; do sleep 1; done
  - blkid "$DISK_STABLE" || mkfs.ext4 "$DISK_STABLE"
  - mkdir -p /var/lib/postgresql/data
  - mount "$DISK_STABLE" /var/lib/postgresql/data
  # Sentinel file proves volume is actually mounted (not just an empty dir).
  # Postgres PV initContainer checks for this before starting.
  - touch /var/lib/postgresql/data/.nemo-volume-mounted
  - grep -q "$DISK_STABLE" /etc/fstab || echo "$DISK_STABLE /var/lib/postgresql/data ext4 defaults 0 2" >> /etc/fstab

# Disable swap (required for k3s)
swap:
  filename: /dev/null
  size: 0

# Set up log rotation for container logs (FR-54)
write_files:
  - path: /etc/logrotate.d/containers
    content: |
      /var/log/containers/*.log {
        daily
        rotate 5
        maxsize 50M
        compress
        missingok
        notifempty
        copytruncate
      }
