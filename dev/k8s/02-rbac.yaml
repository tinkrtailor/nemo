apiVersion: v1
kind: ServiceAccount
metadata:
  name: nautiloop-loop-engine
  namespace: nautiloop-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nautiloop-api-server
  namespace: nautiloop-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nautiloop-loop-engine
  namespace: nautiloop-jobs
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "list", "watch", "get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "update", "get"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nautiloop-loop-engine
  namespace: nautiloop-jobs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nautiloop-loop-engine
subjects:
  - kind: ServiceAccount
    name: nautiloop-loop-engine
    namespace: nautiloop-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nautiloop-api-server
  namespace: nautiloop-jobs
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nautiloop-api-server
  namespace: nautiloop-jobs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nautiloop-api-server
subjects:
  - kind: ServiceAccount
    name: nautiloop-api-server
    namespace: nautiloop-system
