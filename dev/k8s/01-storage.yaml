# Postgres data: RWO, local-path (k3d default)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nautiloop-postgres-data
  namespace: nautiloop-system
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
# Bare repo: shared between nautiloop-system and nautiloop-jobs via hostPath PVs.
# k3d is single-node so both PVs can point at the same host directory.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nautiloop-bare-repo-system
spec:
  capacity:
    storage: 10Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /tmp/nautiloop-dev/bare-repo
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nautiloop-bare-repo
  namespace: nautiloop-system
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: manual
  volumeName: nautiloop-bare-repo-system
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nautiloop-bare-repo-jobs
spec:
  capacity:
    storage: 10Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /tmp/nautiloop-dev/bare-repo
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nautiloop-bare-repo
  namespace: nautiloop-jobs
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: manual
  volumeName: nautiloop-bare-repo-jobs
  resources:
    requests:
      storage: 10Gi
---
# Sessions: RWO in nautiloop-jobs
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nautiloop-sessions
  namespace: nautiloop-jobs
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
# Shared cache volume for all caching tools (sccache, npm, pip, etc.).
# Mounted at /cache on implement/revise pods. Env vars in [cache.env]
# tell each tool where its subdirectory lives.
# RWO works for dev k3d since all agent pods land on the single node.
# Prod multi-node needs RWX or tool-native remote backends (e.g. sccache S3).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nautiloop-cache
  namespace: nautiloop-jobs
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
